# Deploy half of the Sparta docs-site PR-preview family. Triggered when the
# build half (website-preview.yml) finishes; downloads its artifact and
# publishes the preview to gh-pages in the base-repo context, then comments the
# URL on the PR. Kept separate from the read-only build half -- that split is
# the trust boundary (the build runs in the possibly-fork PR context and must
# never write to the base repo).
#
# NOTE: the `workflows:` value below MUST match the `name:` of the build
# workflow (website-preview.yml). `workflow_run` triggers only fire when this
# file lives on the default branch (main) -- so previews start deploying once
# this lands on main, NOT on the PR that introduces it.
name: Website Preview Deploy

on:
  workflow_run:
    workflows: ["Website Preview Build"]
    types: [completed]

jobs:
  deploy:
    permissions:
      contents: write
      pull-requests: write
      actions: read
    uses: d-morrison/gha/.github/workflows/preview-deploy.yml@v2
