# Project-specific CI for the Godot game. Imports every resource headlessly in
# full project context so broken scenes, resources, and script compile errors
# surface. No export presets exist yet, so this validates rather than exports.
name: Godot CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Keep in sync with `config/features` in project.godot. Standard (GDScript)
# build — the project uses gl_compatibility and no C#/.NET.
env:
  GODOT_VERSION: 4.6.0

jobs:
  validate:
    name: Import & validate project
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false   # Standard build, not the .NET/C# build

      - name: Import & validate project
        # `--import` loads the whole project (autoloads, class_name globals and
        # cross-script references all resolve) and reports compile/import errors.
        # We deliberately do NOT parse-check each .gd file in isolation: a lone
        # script can't see project-global identifiers (e.g. autoloads), which
        # yields false "Identifier not found" failures even when the project is
        # valid. Godot doesn't reliably exit non-zero on script errors, so we
        # fail the job if any error marker shows up in the import log.
        run: |
          set -o pipefail
          godot --headless --import --verbose 2>&1 | tee import.log
          if grep -E "SCRIPT ERROR|Failed to load script|Parse Error|Compile Error" import.log; then
            echo "::error::Godot reported script/resource errors during import"
            exit 1
          fi
