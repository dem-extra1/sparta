# Validates the URLs in the repo's docs (README.md, ASSETS.md, etc.) with lychee.
# Calls the reusable workflow in d-morrison/gha. On main/scheduled runs it opens a
# tracking issue when links break; on PRs add the `links checked by hand` label to
# skip.
#
# Single job: the reusable link-checker job declares `issues: write`, and a
# reusable workflow's permissions must be <= the caller's, so a read-only PR job
# startup-fails. Grant issues: write here (issue-filing still only runs on main).
#
# Pinned to the @v2 moving major tag (not @main) — the upstream-recommended
# consumer pin: it tracks reviewed v2 releases rather than every main commit.
name: Check Links

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'   # weekly, Monday 08:00 UTC — catches link rot over time
  workflow_dispatch:

jobs:
  check:
    permissions:
      contents: read
      issues: write          # file/update the broken-links issue (main only)
      pull-requests: read    # read the skip-label on PRs
    uses: d-morrison/gha/.github/workflows/check-links.yml@v2
    with:
      lychee-config: lychee.toml
    # with:
    #   lychee-args: '--verbose "**/*.md"'   # override the default glob set
    #   create-issue-on-main: false          # don't auto-open an issue
