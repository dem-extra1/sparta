# Flags curly quotes and en/em dashes in .qmd / .R files (the documentation site
# under website/), via the reusable workflow in d-morrison/gha. Keeps the Quarto
# source in plain ASCII so pandoc's smart typography renders the punctuation,
# rather than committing raw Unicode that can break tooling.
#
# Pinned to the @v1 moving major tag — the upstream-recommended consumer pin.
name: Check Non-Standard Characters

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    uses: d-morrison/gha/.github/workflows/check-non-standard-chars.yml@v1
