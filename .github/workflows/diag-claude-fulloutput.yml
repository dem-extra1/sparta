name: diag-claude-fulloutput

# Temporary diagnostic: reproduce the claude-review failure with full SDK output
# visible, to read the exact API/auth/usage error the normal review hides.
# Triggered manually (workflow_dispatch); delete this branch when done.
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@2fee15510437d71399d9139ed60433470484a8fb
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "Reply with exactly: ping"
          show_full_output: "true"
