# Housekeeping half of the Sparta docs-site PR-preview family: periodically
# delete gh-pages preview directories for PRs that are no longer open, so the
# gh-pages branch doesn't accumulate stale per-PR preview builds.
name: Website Preview Cleanup

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at 00:00 UTC

jobs:
  cleanup:
    permissions:
      contents: write
      pull-requests: read
    uses: d-morrison/gha/.github/workflows/cleanup-pr-previews.yml@v2
