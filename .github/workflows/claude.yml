# Copy to .github/workflows/claude.yml in your repo.
# NOTE: requires the CLAUDE_CODE_OAUTH_TOKEN repository secret. The calling job
# grants write permissions so Claude can push branches and open PRs. Secrets are
# passed explicitly (not via `secrets: inherit`) because the reusable workflow
# lives in a different account's repo (d-morrison/gha) — `inherit` only forwards
# secrets to reusable workflows within the SAME owner/org, so across owners it
# silently passes an empty token. SUBMODULES_TOKEN is optional (only needed when
# checkout-submodules is enabled) and resolves to empty when unset.
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    # `assigned` lets an issue that already mentions @claude kick off a run when
    # it's assigned (handy with eager-pr). The trusted-author gate keys on the
    # issue *author*, so this only fires for issues opened by a collaborator.
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: write
    # Pinned to the @v1 moving major tag — the upstream-recommended consumer pin
    # (v1 now includes the Claude caller workflows).
    uses: d-morrison/gha/.github/workflows/claude.yml@v1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      SUBMODULES_TOKEN: ${{ secrets.SUBMODULES_TOKEN }}
    with:
      setup-r: false               # sparta is a Godot project, not an R package
    #   install-quarto: true        # for Quarto books
    #   use-renv: true              # restore deps with renv instead of DESCRIPTION
    #   checkout-submodules: true   # needs the SUBMODULES_TOKEN secret
    #   eager-pr: true              # open the draft PR up front (Copilot-style)
    #   reviewer: d-morrison        # re-requested when Claude pushes to a PR
    #   prompt-addendum: |
    #     This is the sparta Godot game project.
