# Builds the Sparta documentation site (Quarto, in website/) and deploys it to
# GitHub Pages. The site embeds gameplay demo clips, so the build first records a
# couple of deterministic replays headlessly (Godot Movie Maker → ffmpeg → mp4 +
# poster) and drops them into website/media/ — exactly the pipeline demo-video.yml
# uses for PR demos. That keeps no binaries in git and the clips always reflect the
# current main build.
#
# One-time setup: in repo Settings → Pages, set "Source" to "GitHub Actions".
# Until then the deploy step fails with a clear message (the build still runs).
name: Publish site

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/publish-site.yml'
      # Game-code/demo changes can alter what the recorded clips show, so refresh
      # the site (and its demos) when they move too.
      - 'scenes/**'
      - 'scripts/**'
      - 'assets/**'
      - 'project.godot'
      - 'demos/**'
      - 'tools/demo/**'
  workflow_dispatch:

# Allow the deploy job to publish to Pages; read-only for everything else.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; let a running deploy finish (don't cancel).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6.0
  GUT_VERSION: v9.6.0

jobs:
  # Best-effort: record the demo clips. If Godot/Movie Maker flakes (headless GL can
  # deadlock), this job fails but never blocks the site deploy — the pages just
  # render without fresh video, and the <video> embeds fall back gracefully.
  demos:
    if: github.repository == 'Lacaedemon/sparta'
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false   # Standard build, not the .NET/C# build

      - name: Install GUT ${{ env.GUT_VERSION }}
        # The project's test files extend GutTest, so GUT must be present or the
        # import below fails to resolve that class (same as godot-ci.yml).
        run: |
          git clone --depth 1 --branch "$GUT_VERSION" https://github.com/bitwes/Gut.git /tmp/gut
          mkdir -p addons
          rm -rf addons/gut
          cp -r /tmp/gut/addons/gut addons/gut

      - name: Install Xvfb + ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg

      - name: Record demo clips
        # Tighter guard than the job backstop: headless Godot/Xvfb can deadlock on
        # driver init before --quit-after takes effect. Recording is seconds each.
        timeout-minutes: 12
        run: website/tools/record-demos.sh "$GITHUB_WORKSPACE/website/media"

      - name: Upload demo media
        uses: actions/upload-artifact@v4
        with:
          name: demo-media
          path: website/media/*.mp4
          if-no-files-found: warn
          retention-days: 1

      - name: Upload demo posters
        uses: actions/upload-artifact@v4
        with:
          name: demo-posters
          path: website/media/*.jpg
          if-no-files-found: warn
          retention-days: 1

  build-deploy:
    # Run even if the demos job failed/flaked (if: always) — the site must publish
    # regardless. Only on the canonical repo (Pages lives there).
    needs: [demos]
    if: always() && github.repository == 'Lacaedemon/sparta'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Pull recorded clips back into website/media (best-effort — may be absent if
      # the demos job flaked; the merge-multiple downloads both mp4 and jpg).
      - name: Download demo media
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: demo-*
          merge-multiple: true
          path: website/media

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render
        working-directory: website

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
