# Requires the CLAUDE_CODE_OAUTH_TOKEN repository secret. The workflow_dispatch
# path lets claude.yml re-dispatch a review after an @claude run pushes commits
# — keep the file named claude-code-review.yml (or set claude.yml's
# review-workflow-file to match). The review logic lives in _claude-review.yml
# (a local fork of d-morrison/gha's reusable workflow).
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number

concurrency:
  group: claude-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    # Inline local fork of the review reusable workflow so we can apply local
    # policy (draft PRs included, cancel-in-progress). Forked from
    # d-morrison/gha/.github/workflows/claude-code-review.yml.
    uses: ./.github/workflows/_claude-review.yml
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      # Wires the workflow_dispatch input through so claude.yml can re-dispatch
      # a review on Claude's commits; empty (and ignored) for pull_request runs.
      pr-number: ${{ inputs.pr_number }}
    # with:
    #   prompt-addendum: |
    #     Repo-specific review guidance (e.g. Godot/GDScript conventions to enforce).
