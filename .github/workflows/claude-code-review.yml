# Copy to .github/workflows/claude-code-review.yml in your repo.
# NOTE: requires the CLAUDE_CODE_OAUTH_TOKEN repository secret (passed via
# `secrets: inherit`). The workflow_dispatch path lets claude.yml re-dispatch a
# review after an @claude run pushes commits — keep the file named
# claude-code-review.yml (or set claude.yml's review-workflow-file to match).
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    # Pinned to @main: the Claude reusable workflows are not yet included in a
    # tagged release of d-morrison/gha (the v1 tag predates them).
    uses: d-morrison/gha/.github/workflows/claude-code-review.yml@main
    secrets: inherit
    with:
      # Wires the workflow_dispatch input through so claude.yml can re-dispatch
      # a review on Claude's commits; empty (and ignored) for pull_request runs.
      pr-number: ${{ inputs.pr_number }}
    # with:
    #   prompt-addendum: |
    #     Repo-specific review guidance (e.g. Godot/GDScript conventions to enforce).
