# Copy to .github/workflows/claude-code-review.yml in your repo.
# NOTE: requires the CLAUDE_CODE_OAUTH_TOKEN repository secret. It is passed
# explicitly (not via `secrets: inherit`) because the reusable workflow lives
# in a different account's repo (d-morrison/gha) — `inherit` only forwards
# secrets to reusable workflows within the SAME owner/org, so across owners it
# silently passes an empty token and the action aborts. The workflow_dispatch
# path lets claude.yml re-dispatch a review after an @claude run pushes commits
# — keep the file named claude-code-review.yml (or set claude.yml's
# review-workflow-file to match).
name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number to review'
        required: true
        type: number

jobs:
  review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    # Pinned to the @v1 moving major tag — the upstream-recommended consumer pin
    # (v1 now includes the Claude caller workflows).
    uses: d-morrison/gha/.github/workflows/claude-code-review.yml@v1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      # Wires the workflow_dispatch input through so claude.yml can re-dispatch
      # a review on Claude's commits; empty (and ignored) for pull_request runs.
      pr-number: ${{ inputs.pr_number }}
      prompt-addendum: |
        **Post line-specific findings as inline review comments** anchored to the
        relevant line(s) — use the inline-comment tool, not a prose list in the
        summary. Reserve the top-level summary comment for a brief overall verdict
        plus any finding not tied to a specific line; don't restate each inline
        comment there.
